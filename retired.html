<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة التقاعد الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50; 
            --accent: #e67e22; 
            --success: #27ae60; 
            --bg: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Rubik', sans-serif; 
            background-color: var(--bg);
            margin: 0; 
            padding: 15px; 
            color: var(--primary); 
            direction: rtl;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 800px; 
            margin: 0 auto; 
            background: #fff;
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
        }

        h2 { 
            text-align: center; 
            border-bottom: 3px solid var(--accent); 
            padding-bottom: 10px; 
            margin-bottom: 25px; 
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            line-height: 1.4;
        }

        .field-group {
            background: #fdfdfd; 
            padding: 20px; 
            border: 1px solid #eee; 
            border-radius: 15px; 
            margin-bottom: 20px;
        }

        h3 { 
            font-size: clamp(1rem, 3.5vw, 1.2rem); 
            color: var(--accent); 
            margin-bottom: 15px; 
        }

        /* تصميم القاصة التفاعلي */
        .safe-dial-wrapper {
            position: relative; 
            background: #222; 
            border-radius: 15px;
            height: 100px; 
            border: 4px solid #444; 
            overflow: hidden;
            display: flex; 
            align-items: center;
            box-shadow: inset 0 0 20px #000;
            touch-action: pan-x;
        }

        .safe-dial-scroll {
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory;
            width: 100%; 
            height: 100%; 
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-left: calc(50% - 40px);
            padding-right: calc(50% - 40px);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .safe-dial-scroll::-webkit-scrollbar { display: none; }

        .dial-number {
            scroll-snap-align: center; 
            min-width: 80px; 
            text-align: center;
            font-size: clamp(1.8rem, 6vw, 2.5rem); 
            font-weight: 800; 
            color: #555;
            transition: 0.3s; 
            cursor: pointer;
            user-select: none;
        }

        .dial-number.selected {
            color: var(--accent); 
            transform: scale(1.3);
            text-shadow: 0 0 15px rgba(230, 126, 34, 0.6);
        }

        .center-marker {
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%);
            width: 85px; 
            height: 85%; 
            border: 2px solid var(--accent);
            border-radius: 12px; 
            pointer-events: none;
            box-shadow: 0 0 15px rgba(230, 126, 34, 0.3);
        }

        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
        }
        
        label { 
            font-size: clamp(0.9rem, 3vw, 1rem); 
            font-weight: 600; 
        }

        input[type="number"] {
            height: 50px; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
            font-size: clamp(0.9rem, 3vw, 1.1rem); 
            padding: 0 15px; 
            font-family: 'Rubik';
            width: 100%;
            background-color: white;
            direction: ltr;
            text-align: right;
        }

        select { 
            height: 50px; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
            font-size: clamp(0.9rem, 3vw, 1.1rem); 
            padding: 0 10px; 
            font-family: 'Rubik';
            width: 100%;
            background-color: white;
        }

        .btn-calc {
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white;
            border: none; 
            border-radius: 12px; 
            font-size: clamp(1.1rem, 4vw, 1.3rem); 
            font-weight: 700;
            cursor: pointer; 
            margin-top: 15px;
            font-family: 'Rubik';
        }

        #resultBox { 
            display: none; 
            margin-top: 25px; 
        }

        .final-pension-card { 
            text-align: center; 
            background: var(--success); 
            color: white; 
            padding: 25px; 
            border-radius: 15px; 
        }

        .amount { 
            font-size: clamp(1.8rem, 7vw, 2.8rem); 
            font-weight: 700; 
            display: block; 
            margin-top: 10px;
        }

        .details-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 15px; 
        }

        .detail-item { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #eee; 
        }

        .detail-item span { font-size: 0.8rem; color: #666; display: block; }
        .detail-item strong { display: block; font-size: 1rem; color: var(--primary); }

        /* تعديلات الهاتف (الحقول عمودية) */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr; /* جعل الحقول عمودية */
            }
            .form-group[style*="grid-column: span 2"] {
                grid-column: span 1 !important;
            }
            .details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>حاسبة الراتب التقاعدي</h2>

    <form id="pensionForm">
        <div class="field-group">
            <h3>سنوات الخدمة (اسحب لاختيار السنة)</h3>
            <div class="safe-dial-wrapper">
                <div class="center-marker"></div>
                <div class="safe-dial-scroll" id="dialScroll"></div>
            </div>
            <input type="hidden" id="serviceYears" value="15">
        </div>

        <div class="field-group">
            <h3>رواتب آخر 3 سنوات من الخدمة</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>معدل راتب السنة الأولى</label>
                    <input type="number" id="salaryYear1" placeholder="مثال: 1000000" min="0">
                </div>
                <div class="form-group">
                    <label>معدل راتب السنة الثانية</label>
                    <input type="number" id="salaryYear2" placeholder="مثال: 1100000" min="0">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>معدل راتب السنة الثالثة</label>
                    <input type="number" id="salaryYear3" placeholder="مثال: 1200000" min="0">
                </div>
            </div>
        </div>

        <div class="field-group">
            <div class="form-grid">
                <div class="form-group">
                    <label>التحصيل الدراسي</label>
                    <select id="degree">
                        <option value="0.00">إعدادية فما دون</option>
                        <option value="0.05">دبلوم</option>
                        <option value="0.10">بكلوريوس</option>
                        <option value="0.15">ماجستير</option>
                        <option value="0.20">دكتوراه</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>عدد الأطفال</label>
                    <select id="childrenCount">
                        <option value="0">بدون أطفال</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="button" class="btn-calc" onclick="calculateFinal()">حساب الراتب النهائي</button>
    </form>

    <div id="resultBox">
        <div class="final-pension-card">
            <h4>صافي الراتب التقاعدي المتوقع</h4>
            <span id="totalAmount" class="amount">0 د.ع</span>
        </div>
        <div class="details-grid">
            <div class="detail-item"><span>متوسط الراتب</span><strong id="resAvg">0</strong></div>
            <div class="detail-item"><span>سنوات الخدمة</span><strong id="resYears">0</strong></div>
            <div class="detail-item"><span>الراتب الأساسي</span><strong id="resBasic">0</strong></div>
            <div class="detail-item"><span>مبلغ الشهادة</span><strong id="resDegree">0</strong></div>
            <div class="detail-item"><span>مخصصات الأطفال</span><strong id="resChildren">0</strong></div>
            <div class="detail-item"><span>غلاء المعيشة</span><strong>100,000 د.ع</strong></div>
        </div>
    </div>
</div>

<script>
    // إعداد القاصة (Dial)
    const dialScroll = document.getElementById('dialScroll');
    const serviceYearsInput = document.getElementById('serviceYears');

    for (let i = 15; i <= 50; i++) {
        const div = document.createElement('div');
        div.className = 'dial-number';
        if (i === 15) div.classList.add('selected');
        div.textContent = i;
        div.onclick = () => {
            div.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        };
        dialScroll.appendChild(div);
    }

    // مراقبة السحب لتحديث القيمة المختارة
    dialScroll.addEventListener('scroll', () => {
        const itemWidth = 80;
        const scrollPos = dialScroll.scrollLeft;
        const index = Math.round(Math.abs(scrollPos) / itemWidth);
        const year = 15 + index;
        
        document.querySelectorAll('.dial-number').forEach((el, idx) => {
            el.classList.toggle('selected', idx === index);
        });
        serviceYearsInput.value = year > 50 ? 50 : year;
    });

    // دالة الحساب
    function calculateFinal() {
        const s1 = parseFloat(document.getElementById('salaryYear1').value) || 0;
        const s2 = parseFloat(document.getElementById('salaryYear2').value) || 0;
        const s3 = parseFloat(document.getElementById('salaryYear3').value) || 0;
        const years = parseInt(serviceYearsInput.value);
        const degreeRate = parseFloat(document.getElementById('degree').value);
        const children = parseInt(document.getElementById('childrenCount').value);

        if(!s1 || !s2 || !s3) {
            alert("يرجى إدخال معدل الرواتب للسنوات الثلاث");
            return;
        }

        const avgSalary = (s1 + s2 + s3) / 3;
        const basicPension = avgSalary * (years * 0.025);
        const degreeBonus = basicPension * degreeRate;
        const childrenBonus = children * 25000; 
        const livingAllowance = 100000;

        const total = basicPension + degreeBonus + childrenBonus + livingAllowance;

        document.getElementById('resAvg').innerText = Math.round(avgSalary).toLocaleString() + " د.ع";
        document.getElementById('resYears').innerText = years + " سنة";
        document.getElementById('resBasic').innerText = Math.round(basicPension).toLocaleString() + " د.ع";
        document.getElementById('resDegree').innerText = Math.round(degreeBonus).toLocaleString() + " د.ع";
        document.getElementById('resChildren').innerText = childrenBonus.toLocaleString() + " د.ع";
        document.getElementById('totalAmount').innerText = Math.round(total).toLocaleString() + " د.ع";

        document.getElementById('resultBox').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
