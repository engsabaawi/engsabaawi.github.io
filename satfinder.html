<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Satellite Finder Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #86868b;
            --accent-blue: #0a84ff;
            --accent-green: #30d158;
            --accent-orange: #ff9f0a;
            --accent-red: #ff453a;
            --divider: rgba(84, 84, 88, 0.65);
            --safe-area-top: env(safe-area-inset-top);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            height: 100vh;
        }

        /* --- Header & Search --- */
        .app-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: calc(10px + var(--safe-area-top)) 16px 16px;
            border-bottom: 0.5px solid var(--divider);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .app-title { font-size: 22px; font-weight: 700; }
        
        .location-btn {
            background: rgba(10, 132, 255, 0.15);
            color: var(--accent-blue);
            border: none;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-bar {
            background: #2c2c2e;
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 16px;
            outline: none;
            text-align: right;
        }

        /* --- Satellite List --- */
        .sat-list-container {
            padding-top: 130px;
            padding-bottom: 40px;
            padding-left: 16px;
            padding-right: 16px;
        }

        .sat-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .sat-item:active { transform: scale(0.98); background: #2c2c2e; }

        .sat-info h3 { font-size: 17px; margin-bottom: 4px; }
        .sat-info p { font-size: 13px; color: var(--text-secondary); }
        
        .sat-arrow { 
            color: var(--text-secondary); 
            font-size: 20px;
            opacity: 0.5;
        }

        /* --- Full Screen Modal (Compass) --- */
        .compass-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .compass-modal.active { transform: translateY(0); }

        .modal-header {
            padding: calc(20px + var(--safe-area-top)) 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #3a3a3c;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-title { text-align: center; }
        .modal-title h2 { font-size: 18px; }
        .modal-title span { font-size: 12px; color: var(--text-secondary); }

        /* --- Compass UI --- */
        .compass-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Phone Header Indicator (Fixed) */
        .phone-indicator {
            position: absolute;
            top: 20px;
            width: 4px;
            height: 30px;
            background: var(--accent-orange);
            border-radius: 2px;
            z-index: 50;
            box-shadow: 0 0 10px var(--accent-orange);
        }
        .phone-indicator::after {
            content: 'رأس الهاتف';
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 11px;
            color: var(--accent-orange);
            font-weight: 600;
        }

        /* The Rotating Compass */
        .compass-container {
            width: 300px;
            height: 300px;
            position: relative;
            margin-top: 40px;
        }

        .compass-face {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at center, #2c2c2e 0%, #000 100%);
            border: 2px solid #3a3a3c;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.1s linear; /* Smooth rotation */
        }

        /* Ticks */
        .tick {
            position: absolute;
            left: 50%; top: 0;
            width: 1px; height: 10px;
            background: #555;
            transform-origin: 50% 150px; /* Half of container size */
        }
        .tick.major { height: 15px; background: #fff; width: 2px; }
        
        .direction-label {
            position: absolute;
            font-weight: bold;
            font-size: 18px;
            color: white;
            transform-origin: center;
        }
        .n { top: 20px; left: 50%; transform: translateX(-50%); color: var(--accent-red); }
        .s { bottom: 20px; left: 50%; transform: translateX(-50%); }
        .e { right: 20px; top: 50%; transform: translateY(-50%); }
        .w { left: 20px; top: 50%; transform: translateY(-50%); }

        /* The Satellite Target (Rotates with face) */
        .satellite-marker {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        .sat-icon {
            position: absolute;
            top: 5px; /* On the rim */
            left: 50%;
            transform: translateX(-50%);
            width: 30px; height: 30px;
            background: var(--accent-green);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 15px var(--accent-green);
            z-index: 10;
        }
        
        .sat-line {
            position: absolute;
            top: 35px; left: 50%;
            width: 2px; height: 115px;
            background: linear-gradient(to bottom, var(--accent-green), transparent);
            transform: translateX(-50%);
        }

        /* Crosshair in center */
        .center-cross {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Info Panel in Modal */
        .info-panel {
            background: #1c1c1e;
            margin: 20px;
            padding: 20px;
            border-radius: 16px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2c2c2e;
        }
        .data-row:last-child { border: none; margin: 0; padding: 0; }
        
        .data-label { color: var(--text-secondary); font-size: 14px; }
        .data-value { font-weight: 700; font-family: monospace; font-size: 16px; }

        .status-bar {
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
            background: #2c2c2e;
            color: var(--text-secondary);
            transition: background 0.3s;
        }
        .status-bar.aligned { background: var(--accent-green); color: black; }
        .status-bar.close { background: var(--accent-orange); color: black; }

        /* Helpers */
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-top">
            <div class="app-title">Satellite Finder Pro 📡</div>
            <button class="location-btn" onclick="getLocation()">
                <span id="loc-status">📍 تحديد الموقع</span>
            </button>
        </div>
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" class="search-input" placeholder="ابحث عن قمر (مثال: Nilesat)..." oninput="filterSatellites(this.value)">
        </div>
    </header>

    <div class="sat-list-container" id="sat-list">
        </div>

    <div class="compass-modal" id="compassModal">
        <div class="modal-header">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div class="modal-title">
                <h2 id="modal-sat-name">Nilesat</h2>
                <span id="modal-sat-pos">7.0° W</span>
            </div>
            <div style="width: 36px;"></div> </div>

        <div class="compass-area">
            <div class="phone-indicator"></div>
            
            <div class="compass-container">
                <div class="compass-face" id="compassFace">
                    <div class="direction-label n">N</div>
                    <div class="direction-label e">E</div>
                    <div class="direction-label s">S</div>
                    <div class="direction-label w">W</div>
                    
                    <div class="satellite-marker" id="satMarker">
                        <div class="sat-icon">🛰️</div>
                        <div class="sat-line"></div>
                    </div>

                    <div class="center-cross"></div>
                </div>
            </div>
        </div>

        <div class="status-bar" id="alignStatus">
            يرجى تحديد الموقع أولاً
        </div>

        <div class="info-panel">
            <div class="data-row">
                <span class="data-label">اتجاه السمت (Azimuth)</span>
                <span class="data-value" id="val-az">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">الارتفاع (Elevation)</span>
                <span class="data-value" id="val-el">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">اتجاهك الحالي</span>
                <span class="data-value" id="val-head">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">الفرق</span>
                <span class="data-value" id="val-diff">---</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Data Source (West to East) ---
        const satellites = [
            { name: "Hispasat 30W-6", pos: "30.0° W", lon: -30.0 },
            { name: "Intelsat 905", pos: "24.5° W", lon: -24.5 },
            { name: "NSS 7", pos: "20.0° W", lon: -20.0 },
            { name: "Telstar 12", pos: "15.0° W", lon: -15.0 },
            { name: "Express AM8", pos: "14.0° W", lon: -14.0 },
            { name: "Eutelsat 8 West B", pos: "8.0° W", lon: -8.0 },
            { name: "Nilesat 201", pos: "7.0° W", lon: -7.0 },
            { name: "Eutelsat 5 West B", pos: "5.0° W", lon: -5.0 },
            { name: "Amos 3/7", pos: "4.0° W", lon: -4.0 },
            { name: "Thor 5/6/7", pos: "0.8° W", lon: -0.8 },
            { name: "Eutelsat 3B", pos: "3.1° E", lon: 3.1 },
            { name: "Astra 4A", pos: "4.8° E", lon: 4.8 },
            { name: "Eutelsat 7C", pos: "7.0° E", lon: 7.0 },
            { name: "Eutelsat 9B", pos: "9.0° E", lon: 9.0 },
            { name: "Eutelsat 10A", pos: "10.0° E", lon: 10.0 },
            { name: "Hot Bird 13F/13G", pos: "13.0° E", lon: 13.0 },
            { name: "Eutelsat 16A", pos: "16.0° E", lon: 16.0 },
            { name: "Astra 1KR/1L/1M", pos: "19.2° E", lon: 19.2 },
            { name: "Astra 3B", pos: "23.5° E", lon: 23.5 },
            { name: "Eutelsat 25B / Es'hail 1", pos: "25.5° E", lon: 25.5 },
            { name: "Arabsat Badr 4/5/6", pos: "26.0° E", lon: 26.0 },
            { name: "Astra 2E/2F/2G", pos: "28.2° E", lon: 28.2 },
            { name: "Arabsat 5A", pos: "30.5° E", lon: 30.5 },
            { name: "Eutelsat 33E", pos: "33.1° E", lon: 33.1 },
            { name: "Eutelsat 36B", pos: "36.0° E", lon: 36.0 },
            { name: "Paksat 1R", pos: "38.0° E", lon: 38.0 },
            { name: "Hellas Sat 3/4", pos: "39.0° E", lon: 39.0 },
            { name: "Türksat 3A/4A", pos: "42.0° E", lon: 42.0 },
            { name: "AzerSpace 1", pos: "46.0° E", lon: 46.0 },
            { name: "Yahsat 1B", pos: "52.5° E", lon: 52.5 },
            { name: "Express AM6", pos: "53.0° E", lon: 53.0 },
            { name: "Yamal 402", pos: "55.0° E", lon: 55.0 },
            { name: "NSS 12", pos: "57.0° E", lon: 57.0 },
            { name: "Intelsat 33e", pos: "60.0° E", lon: 60.0 },
            { name: "Intelsat 17", pos: "66.0° E", lon: 66.0 },
            { name: "Intelsat 20", pos: "68.5° E", lon: 68.5 },
            { name: "Eutelsat 70B", pos: "70.5° E", lon: 70.5 },
            { name: "ABS 2", pos: "75.0° E", lon: 75.0 },
            { name: "Apstar 7", pos: "76.5° E", lon: 76.5 },
            { name: "Thaicom 6", pos: "78.5° E", lon: 78.5 },
            { name: "Express AM2", pos: "80.0° E", lon: 80.0 },
            { name: "Insat 4A", pos: "83.0° E", lon: 83.0 },
            { name: "Horizons 2", pos: "85.0° E", lon: 85.0 },
            { name: "ChinaSat 12", pos: "87.5° E", lon: 87.5 },
            { name: "ST 2", pos: "88.0° E", lon: 88.0 },
            { name: "Yamal 401", pos: "90.0° E", lon: 90.0 },
            { name: "Measat 3", pos: "91.5° E", lon: 91.5 },
            { name: "ChinaSat 11", pos: "98.0° E", lon: 98.0 },
            { name: "AsiaSat 5", pos: "100.5° E", lon: 100.5 },
            { name: "AsiaSat 7", pos: "105.5° E", lon: 105.5 },
            { name: "SES 7/9", pos: "108.2° E", lon: 108.2 }
        ];

        // --- 2. State & initialization ---
        let userLat = null;
        let userLon = null;
        let currentTarget = null;
        let watchId = null;
        let audioCtx = null;

        document.addEventListener('DOMContentLoaded', () => {
            renderList(satellites);
            initCompassTicks();
            document.body.addEventListener('click', initAudio, { once: true });
        });

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // --- 3. UI Functions ---
        function renderList(list) {
            const container = document.getElementById('sat-list');
            container.innerHTML = list.map((sat, index) => `
                <div class="sat-item" onclick="openCompass(${index}, '${sat.name}', '${sat.pos}', ${sat.lon})">
                    <div class="sat-info">
                        <h3>${sat.name}</h3>
                        <p>${sat.pos}</p>
                    </div>
                    <div class="sat-arrow">›</div>
                </div>
            `).join('');
        }

        function filterSatellites(query) {
            const term = query.toLowerCase();
            const filtered = satellites.filter(s => 
                s.name.toLowerCase().includes(term) || s.pos.toLowerCase().includes(term)
            );
            renderList(filtered);
        }

        function initCompassTicks() {
            const face = document.getElementById('compassFace');
            for (let i = 0; i < 360; i += 5) {
                if (i % 90 === 0) continue; // Skip cardinals
                const tick = document.createElement('div');
                tick.className = i % 10 === 0 ? 'tick major' : 'tick';
                tick.style.transform = `rotate(${i}deg)`;
                face.appendChild(tick);
            }
        }

        // --- 4. Location & Math ---
        function getLocation() {
            const status = document.getElementById('loc-status');
            status.textContent = 'جاري التحديد...';
            
            if (!navigator.geolocation) {
                alert('المتصفح لا يدعم تحديد الموقع');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    status.textContent = `✅ ${userLat.toFixed(2)}, ${userLon.toFixed(2)}`;
                    status.parentElement.style.background = 'rgba(48, 209, 88, 0.2)';
                    status.parentElement.style.color = '#30d158';
                    
                    // If modal is open, update calculation
                    if (currentTarget) updateCalculations(currentTarget);
                },
                (err) => {
                    status.textContent = '❌ فشل التحديد';
                    alert('يرجى تفعيل GPS');
                },
                { enableHighAccuracy: true }
            );
        }

        function calcAzimuth(satLon) {
            if (userLat === null) return 0;
            const latRad = userLat * Math.PI / 180;
            const dLon = (satLon - userLon) * Math.PI / 180;
            const y = Math.sin(dLon);
            const x = Math.cos(dLon) * Math.sin(latRad);
            let az = Math.atan2(y, x) * 180 / Math.PI;
            return (az + 360) % 360; // Normalize 0-360
        }

        function calcElevation(satLon) {
            if (userLat === null) return 0;
            const R = 6371; // Earth radius
            const h = 35786; // Orbit height
            const latRad = userLat * Math.PI / 180;
            const dLon = (satLon - userLon) * Math.PI / 180;
            const cosGamma = Math.cos(latRad) * Math.cos(dLon);
            const el = Math.atan((cosGamma - R/(R+h)) / Math.sqrt(1 - cosGamma**2)) * 180 / Math.PI;
            return Math.max(0, el); // No negative elevation
        }

        // --- 5. Modal & Compass Logic ---
        async function openCompass(index, name, pos, lon) {
            currentTarget = { name, pos, lon };
            
            document.getElementById('modal-sat-name').textContent = name;
            document.getElementById('modal-sat-pos').textContent = pos;
            document.getElementById('compassModal').classList.add('active');
            
            updateCalculations(currentTarget);

            // Request permission for iOS
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    if (perm !== 'granted') alert('يرجى السماح باستخدام البوصلة');
                } catch (e) {
                    console.error(e);
                }
            }

            startCompass();
        }

        function closeModal() {
            document.getElementById('compassModal').classList.remove('active');
            stopCompass();
            currentTarget = null;
        }

        function updateCalculations(target) {
            if (userLat === null) {
                document.getElementById('alignStatus').textContent = 'يرجى تحديد الموقع أولاً ⚠️';
                return;
            }

            const az = calcAzimuth(target.lon);
            const el = calcElevation(target.lon);

            document.getElementById('val-az').textContent = az.toFixed(1) + '°';
            document.getElementById('val-el').textContent = el.toFixed(1) + '°';
            
            // Set satellite marker position relative to North (0 on the dial)
            // The dial rotates, so we just place the marker at the fixed degree on the dial
            const marker = document.getElementById('satMarker');
            marker.style.transform = `rotate(${az}deg)`;
        }

        function startCompass() {
            const handleOrientation = (e) => {
                if (!currentTarget || userLat === null) return;

                // 1. Get Heading
                let heading = 0;
                if (e.webkitCompassHeading) {
                    heading = e.webkitCompassHeading; // iOS
                } else if (e.alpha !== null) {
                    heading = 360 - e.alpha; // Android (simplified)
                }
                heading = (heading + 360) % 360;

                // 2. Rotate Compass Face
                // We rotate the face NEGATIVE to the heading.
                // If phone points East (90), Face rotates -90 so "N" is at left (West).
                const face = document.getElementById('compassFace');
                face.style.transform = `rotate(${-heading}deg)`;

                // 3. Calculate Diff
                const targetAz = calcAzimuth(currentTarget.lon);
                let diff = targetAz - heading;
                
                // Normalize diff -180 to 180
                while (diff < -180) diff += 360;
                while (diff > 180) diff -= 360;
                
                const absDiff = Math.abs(diff);

                // 4. Update UI
                document.getElementById('val-head').textContent = heading.toFixed(0) + '°';
                document.getElementById('val-diff').textContent = absDiff.toFixed(1) + '°';
                
                const statusEl = document.getElementById('alignStatus');
                
                let dir = diff > 0 ? 'يمين ⟳' : 'يسار ⟲';

                if (absDiff < 3) {
                    statusEl.textContent = '🚀 إشارة ممتازة! ثبت الطبق';
                    statusEl.className = 'status-bar aligned';
                    playBeep(880);
                    if (navigator.vibrate) navigator.vibrate(50);
                } else if (absDiff < 15) {
                    statusEl.textContent = `قريب.. در لـ ${dir}`;
                    statusEl.className = 'status-bar close';
                } else {
                    statusEl.textContent = `ابحث.. در لـ ${dir}`;
                    statusEl.className = 'status-bar';
                }
            };

            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
            window._compassHandler = handleOrientation;
        }

        function stopCompass() {
            if (window._compassHandler) {
                window.removeEventListener('deviceorientation', window._compassHandler, true);
                window.removeEventListener('deviceorientationabsolute', window._compassHandler, true);
            }
        }

        // Sound Engine
        let lastBeep = 0;
        function playBeep(freq) {
            const now = Date.now();
            if (now - lastBeep < 200 || !audioCtx) return; // Prevent spam
            lastBeep = now;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</body>
</html>
