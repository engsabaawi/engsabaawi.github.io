<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Satellite Finder - دليل الأقمار الصناعية</title>
    <style>
        /* Apple Design System - Colors & Variables */
        :root {
            /* Apple System Colors */
            --apple-black: #000000;
            --apple-white: #ffffff;
            --apple-gray-6: #f5f5f7;
            --apple-gray-5: #e8e8ed;
            --apple-gray-4: #d2d2d7;
            --apple-gray-3: #86868b;
            --apple-gray-2: #636366;
            --apple-gray: #48484a;
            --apple-dark-gray: #1d1d1f;
            --apple-label: rgba(0, 0, 0, 0.85);
            --apple-secondary-label: rgba(0, 0, 0, 0.55);
            --apple-tertiary-label: rgba(0, 0, 0, 0.25);
            --apple-quaternary-label: rgba(0, 0, 0, 0.1);
            
            /* Apple Blue */
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ed;
            --apple-blue-pressed: #0068d1;
            --apple-light-blue: #2997ff;
            
            /* Apple Accent Colors */
            --apple-green: #34c759;
            --apple-orange: #ff9500;
            --apple-pink: #ff2d55;
            --apple-purple: #af52de;
            --apple-red: #ff3b30;
            --apple-teal: #5ac8fa;
            --apple-yellow: #ffcc00;
            --apple-indigo: #5856d6;
            
            /* Dark Mode Colors */
            --apple-dark-bg: #000000;
            --apple-dark-elevated: #1c1c1e;
            --apple-dark-secondary: #2c2c2e;
            --apple-dark-tertiary: #3a3a3c;
            
            /* Glassmorphism */
            --glass-light: rgba(255, 255, 255, 0.72);
            --glass-dark: rgba(29, 29, 31, 0.72);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-border-dark: rgba(255, 255, 255, 0.1);
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.15);
            
            /* Typography */
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            
            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            
            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-stack);
            background: var(--apple-dark-bg);
            color: var(--apple-white);
            line-height: 1.47059;
            font-size: 17px;
            letter-spacing: -0.022em;
            overflow-x: hidden;
        }

        /* Dynamic Island / Notch Area */
        .status-bar {
            height: 44px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            backdrop-filter: saturate(180%) blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
        }

        /* Hero Section - Apple Style */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 80px;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #000000 70%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.15) 0%, transparent 50%);
            animation: pulse-glow 8s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 980px;
        }

        .hero-eyebrow {
            font-size: 21px;
            font-weight: 600;
            color: var(--apple-orange);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .hero-title {
            font-size: 80px;
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin-bottom: 24px;
            background: linear-gradient(180deg, #ffffff 0%, #86868b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 28px;
            line-height: 1.28577;
            font-weight: 400;
            letter-spacing: 0.007em;
            color: var(--apple-gray-3);
            margin-bottom: 40px;
        }

        /* Apple Button Styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 36px;
            font-size: 17px;
            font-weight: 600;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-family: inherit;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--apple-blue);
            color: var(--apple-white);
            box-shadow: 0 4px 16px rgba(0, 113, 227, 0.4);
        }

        .btn-primary:hover {
            background: var(--apple-blue-hover);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.5);
        }

        .btn-primary:active {
            background: var(--apple-blue-pressed);
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--glass-dark);
            color: var(--apple-white);
            border: 1px solid var(--glass-border-dark);
            backdrop-filter: blur(20px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-large {
            padding: 20px 48px;
            font-size: 19px;
        }

        /* Search Section - iOS Style */
        .search-section {
            padding: 40px 20px;
            background: var(--apple-dark-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: saturate(180%) blur(20px);
            background-color: rgba(0, 0, 0, 0.8);
            border-bottom: 0.5px solid var(--glass-border-dark);
        }

        .search-container {
            max-width: 680px;
            margin: 0 auto;
        }

        .search-box {
            position: relative;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--apple-gray-3);
            font-size: 20px;
            z-index: 2;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--apple-dark-tertiary);
            border: 1px solid transparent;
            border-radius: var(--radius-full);
            color: var(--apple-white);
            font-size: 17px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            background: var(--apple-dark-secondary);
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        .search-input::placeholder {
            color: var(--apple-gray-3);
        }

        /* Location Chip */
        .location-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 20px;
            background: var(--apple-dark-secondary);
            border-radius: var(--radius-full);
            font-size: 15px;
            color: var(--apple-gray-3);
            border: 1px solid var(--glass-border-dark);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .location-chip.active {
            opacity: 1;
            transform: translateY(0);
        }

        .location-chip.success {
            color: var(--apple-green);
            border-color: rgba(52, 199, 89, 0.3);
        }

        /* Satellites Grid - Apple Card Style */
        .satellites-section {
            padding: 60px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .section-title {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.003em;
            margin-bottom: 12px;
        }

        .section-subtitle {
            font-size: 21px;
            color: var(--apple-gray-3);
        }

        .satellites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        /* Apple Card Component */
        .apple-card {
            background: var(--apple-dark-elevated);
            border-radius: var(--radius-xl);
            overflow: hidden;
            border: 0.5px solid var(--glass-border-dark);
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
        }

        .apple-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-header {
            padding: 24px;
            background: linear-gradient(135deg, rgba(0, 113, 227, 0.1) 0%, transparent 100%);
            border-bottom: 0.5px solid var(--glass-border-dark);
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: rgba(0, 113, 227, 0.2);
            color: var(--apple-light-blue);
            font-size: 12px;
            font-weight: 600;
            border-radius: var(--radius-full);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 17px;
            color: var(--apple-gray-3);
        }

        .card-content {
            padding: 24px;
        }

        /* Apple Table Style */
        .info-table {
            width: 100%;
            border-collapse: collapse;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--glass-border-dark);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: var(--apple-gray-3);
        }

        .info-value {
            font-size: 17px;
            font-weight: 600;
            color: var(--apple-white);
            font-variant-numeric: tabular-nums;
        }

        /* Compass Toggle Button */
        .compass-toggle {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            background: var(--apple-dark-tertiary);
            border: 1px solid var(--glass-border-dark);
            border-radius: var(--radius-md);
            color: var(--apple-white);
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .compass-toggle:hover {
            background: var(--apple-dark-secondary);
            border-color: var(--apple-blue);
        }

        .compass-toggle.active {
            background: var(--apple-blue);
            border-color: var(--apple-blue);
            color: var(--apple-white);
        }

        /* Compass Section - Apple Style Integration */
        .compass-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            background: var(--apple-black);
        }

        .compass-section.active {
            max-height: 600px;
        }

        .compass-inner {
            padding: 32px 24px;
        }

        /* Apple Style Compass */
        .compass-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .compass-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
        }

        .compass-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #2a2a2a, #1a1a1a, #2a2a2a, #1a1a1a, #2a2a2a);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        .compass-face {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #3a3a3c 0%, #1c1c1e 100%);
            position: relative;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* Compass Markings */
        .compass-markings {
            position: absolute;
            inset: 0;
            border-radius: 50%;
        }

        .degree-tick {
            position: absolute;
            left: 50%;
            top: 8px;
            width: 2px;
            height: 8px;
            background: var(--apple-gray-3);
            transform-origin: 50% 132px;
            border-radius: 1px;
        }

        .degree-tick.major {
            width: 3px;
            height: 12px;
            background: var(--apple-white);
            top: 6px;
        }

        .compass-direction {
            position: absolute;
            font-size: 14px;
            font-weight: 700;
            color: var(--apple-white);
        }

        .compass-direction.n { top: 20px; left: 50%; transform: translateX(-50%); color: var(--apple-red); }
        .compass-direction.e { right: 20px; top: 50%; transform: translateY(-50%); }
        .compass-direction.s { bottom: 20px; left: 50%; transform: translateX(-50%); }
        .compass-direction.w { left: 20px; top: 50%; transform: translateY(-50%); }

        /* Target Indicator */
        .target-marker {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 14px solid var(--apple-orange);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(255, 149, 0, 0.4));
        }

        /* Rotating Ring */
        .compass-rotating {
            position: absolute;
            inset: 40px;
            border-radius: 50%;
            transition: transform 0.1s ease-out;
        }

        /* Needle */
        .compass-needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 80px;
            background: linear-gradient(to top, var(--apple-red) 0%, #ff453a 100%);
            transform: translate(-50%, -100%);
            transform-origin: bottom center;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.4);
            z-index: 5;
        }

        .compass-needle::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: 0;
            width: 4px;
            height: 80px;
            background: linear-gradient(to bottom, var(--apple-gray-4) 0%, var(--apple-gray-3) 100%);
            border-radius: 2px;
        }

        .needle-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, var(--apple-gray-4) 0%, var(--apple-gray) 100%);
            border-radius: 50%;
            border: 2px solid var(--apple-white);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        /* Status Ring */
        .status-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .status-ring.perfect {
            border-color: var(--apple-green);
            box-shadow: 0 0 30px rgba(52, 199, 89, 0.3);
        }

        .status-ring.close {
            border-color: var(--apple-orange);
        }

        .status-ring.far {
            border-color: var(--apple-gray-3);
        }

        /* Apple Style Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        .metric-card {
            background: var(--apple-dark-elevated);
            border-radius: var(--radius-lg);
            padding: 16px;
            text-align: center;
            border: 0.5px solid var(--glass-border-dark);
        }

        .metric-label {
            font-size: 12px;
            color: var(--apple-gray-3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--apple-white);
            font-variant-numeric: tabular-nums;
        }

        .metric-value.target {
            color: var(--apple-light-blue);
        }

        .metric-value.diff {
            color: var(--apple-orange);
        }

        /* Alignment Status - Apple Style */
        .alignment-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .alignment-pill.perfect {
            background: rgba(52, 199, 89, 0.15);
            color: var(--apple-green);
            border: 1px solid rgba(52, 199, 89, 0.3);
        }

        .alignment-pill.close {
            background: rgba(255, 149, 0, 0.15);
            color: var(--apple-orange);
            border: 1px solid rgba(255, 149, 0, 0.3);
        }

        .alignment-pill.far {
            background: rgba(134, 134, 139, 0.15);
            color: var(--apple-gray-3);
            border: 1px solid rgba(134, 134, 139, 0.3);
        }

        /* Control Buttons - iOS Style */
        .controls-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .control-btn {
            flex: 1;
            padding: 12px;
            background: var(--apple-dark-tertiary);
            border: 0.5px solid var(--glass-border-dark);
            border-radius: var(--radius-md);
            color: var(--apple-white);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: var(--apple-dark-secondary);
        }

        .control-btn.active {
            background: var(--apple-blue);
            color: var(--apple-white);
        }

        /* Empty State - Apple Style */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--apple-gray-3);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Animations */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fade-in-up 0.6s ease forwards;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title { font-size: 48px; }
            .hero-subtitle { font-size: 21px; }
            .section-title { font-size: 32px; }
            .satellites-grid { grid-template-columns: 1fr; }
            .compass-wrapper { width: 240px; height: 240px; }
            .degree-tick { transform-origin: 50% 112px; }
        }

        /* Scrollbar - Apple Style */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--apple-gray);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--apple-gray-3);
        }
    </style>
</head>
<body>
    <!-- Status Bar -->
    <div class="status-bar">
        <span>📡 Satellite Finder</span>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-eyebrow">Pro Orientation System</div>
            <h1 class="hero-title">دليل الأقمار الصناعية</h1>
            <p class="hero-subtitle">نظام متقدم لتوجيه أطباق الاستقبال الفضائية بدقة عالية</p>
            <button class="btn btn-primary btn-large" onclick="scrollToSearch()">
                ابدأ الاستخدام
            </button>
        </div>
    </section>

    <!-- Search Section -->
    <section class="search-section" id="searchSection">
        <div class="search-container">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن القمر الصناعي...">
                </div>
                <button class="btn btn-secondary" onclick="getUserLocation()">
                    📍 تحديد الموقع
                </button>
            </div>
            <div class="location-chip" id="locationChip">
                <span id="locationText">جاري تحديد الموقع...</span>
            </div>
        </div>
    </section>

    <!-- Satellites Section -->
    <section class="satellites-section">
        <div class="section-header">
            <h2 class="section-title">الأقمار المتاحة</h2>
            <p class="section-subtitle">اختر القمر لعرض البوصلة التفاعلية</p>
        </div>
        <div class="satellites-grid" id="satellitesGrid">
            <!-- Cards will be inserted here -->
        </div>
    </section>

    <script>
        // Apple Design System Implementation
        const satellites = [
            { name: "Hispasat 30W-6", position: "30.0° W", longitude: -30.0, freq: "11.731-12.722 GHz", band: "Ku" },
            { name: "Nilesat 201", position: "7.0° W", longitude: -7.0, freq: "10.727-12.729 GHz", band: "Ku" },
            { name: "Eutelsat 8 West B", position: "8.0° W", longitude: -8.0, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "Hot Bird 13F", position: "13.0° E", longitude: 13.0, freq: "10.700-12.750 GHz", band: "Ku" },
            { name: "Hot Bird 13G", position: "13.0° E", longitude: 13.0, freq: "10.700-12.750 GHz", band: "Ku" },
            { name: "Astra 1KR", position: "19.2° E", longitude: 19.2, freq: "10.700-12.750 GHz", band: "Ku" },
            { name: "Astra 3B", position: "23.5° E", longitude: 23.5, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "Arabsat Badr-4", position: "26.0° E", longitude: 26.0, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "Arabsat Badr-5", position: "26.0° E", longitude: 26.0, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "Astra 2E", position: "28.2° E", longitude: 28.2, freq: "10.700-12.750 GHz", band: "Ku" },
            { name: "Arabsat 5A", position: "30.5° E", longitude: 30.5, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "Türksat 4A", position: "42.0° E", longitude: 42.0, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "Intelsat 10-02", position: "47.5° E", longitude: 47.5, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "NSS-12", position: "57.0° E", longitude: 57.0, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "Intelsat 20", position: "68.5° E", longitude: 68.5, freq: "11.470-12.750 GHz", band: "Ku" },
            { name: "ABS-2A", position: "75.0° E", longitude: 75.0, freq: "11.470-12.750 GHz", band: "Ku" }
        ];

        let userLat = null;
        let userLon = null;
        let activeCompass = null;
        let audioCtx = null;
        let soundOn = true;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderSatellites();
            setupSearch();
            
            // Initialize audio on first interaction
            document.addEventListener('click', initAudio, { once: true });
        });

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function scrollToSearch() {
            document.getElementById('searchSection').scrollIntoView({ behavior: 'smooth' });
        }

        function setupSearch() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = satellites.filter(s => 
                    s.name.toLowerCase().includes(term) || 
                    s.position.toLowerCase().includes(term)
                );
                renderSatellites(filtered);
            });
        }

        function getUserLocation() {
            const chip = document.getElementById('locationChip');
            const text = document.getElementById('locationText');
            
            chip.classList.add('active');
            text.textContent = '⏳ جاري تحديد الموقع...';
            
            if (!navigator.geolocation) {
                text.textContent = '❌ المتصفح لا يدعم تحديد الموقع';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    text.textContent = `✅ ${userLat.toFixed(4)}°N, ${userLon.toFixed(4)}°E`;
                    chip.classList.add('success');
                    renderSatellites();
                },
                (err) => {
                    text.textContent = '❌ يرجى السماح بالوصول للموقع';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // Geometric Calculations
        function calcAzimuth(satLon) {
            const latRad = userLat * Math.PI / 180;
            const dLon = (satLon - userLon) * Math.PI / 180;
            const y = Math.sin(dLon);
            const x = Math.cos(dLon) * Math.sin(latRad);
            let az = Math.atan2(y, x) * 180 / Math.PI;
            return (az + 360) % 360;
        }

        function calcElevation(satLon) {
            const R = 6371, h = 35786;
            const latRad = userLat * Math.PI / 180;
            const dLon = (satLon - userLon) * Math.PI / 180;
            const cosGamma = Math.cos(latRad) * Math.cos(dLon);
            const el = Math.atan((cosGamma - R/(R+h)) / Math.sqrt(1 - cosGamma**2)) * 180 / Math.PI;
            return Math.max(0, el);
        }

        function calcDistance(satLon) {
            const R = 6371, h = 35786;
            const latRad = userLat * Math.PI / 180;
            const dLon = (satLon - userLon) * Math.PI / 180;
            const cosGamma = Math.cos(latRad) * Math.cos(dLon);
            const dist = Math.sqrt(R**2 + (R+h)**2 - 2*R*(R+h)*cosGamma);
            return Math.round(dist);
        }

        function renderSatellites(list = satellites) {
            const grid = document.getElementById('satellitesGrid');
            grid.innerHTML = list.map((sat, idx) => {
                const hasLoc = userLat !== null;
                const az = hasLoc ? calcAzimuth(sat.longitude).toFixed(1) : '—';
                const el = hasLoc ? calcElevation(sat.longitude).toFixed(1) : '—';
                const dist = hasLoc ? calcDistance(sat.longitude).toLocaleString() : '—';
                const isActive = activeCompass === idx;

                return `
                    <div class="apple-card animate-in" style="animation-delay: ${idx * 0.05}s">
                        <div class="card-header">
                            <div class="card-badge">${sat.band}-Band</div>
                            <h3 class="card-title">${sat.name}</h3>
                            <p class="card-subtitle">${sat.position} • ${sat.freq}</p>
                        </div>
                        
                        <div class="card-content">
                            <div class="info-table">
                                <div class="info-row">
                                    <span class="info-label">🧭 الاتجاه</span>
                                    <span class="info-value">${az}°</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">📐 الارتفاع</span>
                                    <span class="info-value">${el}°</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">📏 المسافة</span>
                                    <span class="info-value">${dist} كم</span>
                                </div>
                            </div>
                            
                            <button class="compass-toggle ${isActive ? 'active' : ''}" 
                                    onclick="toggleCompass(${idx}, ${sat.longitude})" 
                                    id="toggle-${idx}">
                                ${isActive ? '❌ إخفاء البوصلة' : '🧭 عرض البوصلة'}
                            </button>
                            
                            <div class="compass-section ${isActive ? 'active' : ''}" id="compass-${idx}">
                                <div class="compass-inner">
                                    <div class="compass-container">
                                        <div class="alignment-pill far" id="pill-${idx}">
                                            <span id="pill-text-${idx}">جاري التهيئة...</span>
                                        </div>
                                        
                                        <div class="compass-wrapper">
                                            <div class="compass-outer">
                                                <div class="compass-face" id="face-${idx}">
                                                    <div class="compass-markings" id="marks-${idx}"></div>
                                                    <div class="compass-direction n">N</div>
                                                    <div class="compass-direction e">E</div>
                                                    <div class="compass-direction s">S</div>
                                                    <div class="compass-direction w">W</div>
                                                    <div class="target-marker"></div>
                                                    
                                                    <div class="compass-rotating" id="ring-${idx}">
                                                        <div class="compass-needle"></div>
                                                        <div class="needle-center"></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="status-ring far" id="status-ring-${idx}"></div>
                                        </div>
                                        
                                        <div class="metrics-grid">
                                            <div class="metric-card">
                                                <div class="metric-label">اتجاهك</div>
                                                <div class="metric-value" id="head-${idx}">—</div>
                                            </div>
                                            <div class="metric-card">
                                                <div class="metric-label">هدف القمر</div>
                                                <div class="metric-value target" id="target-${idx}">—</div>
                                            </div>
                                            <div class="metric-card">
                                                <div class="metric-label">الفرق</div>
                                                <div class="metric-value diff" id="diff-${idx}">—</div>
                                            </div>
                                        </div>
                                        
                                        <div class="controls-row">
                                            <button class="control-btn ${!soundOn ? 'active' : ''}" 
                                                    onclick="toggleSound(${idx})" id="sound-${idx}">
                                                ${soundOn ? '🔊' : '🔇'} صوت
                                            </button>
                                            <button class="control-btn" onclick="resetCompass(${idx})">
                                                🔄 إعادة
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add degree marks to active compass
            if (activeCompass !== null) {
                addDegreeMarks(activeCompass);
            }
        }

        function addDegreeMarks(idx) {
            const container = document.getElementById(`marks-${idx}`);
            if (!container) return;
            
            container.innerHTML = '';
            for (let i = 0; i < 360; i += 10) {
                const tick = document.createElement('div');
                tick.className = i % 90 === 0 ? 'degree-tick major' : 'degree-tick';
                tick.style.transform = `rotate(${i}deg)`;
                container.appendChild(tick);
            }
        }

        async function toggleCompass(idx, satLon) {
            if (!userLat) {
                alert('⚠️ يرجى تحديد موقعك أولاً');
                return;
            }

            if (activeCompass === idx) {
                closeCompass(idx);
                return;
            }

            if (activeCompass !== null) {
                closeCompass(activeCompass);
            }

            activeCompass = idx;
            const targetAz = calcAzimuth(satLon);
            
            // Update UI
            document.getElementById(`toggle-${idx}`).classList.add('active');
            document.getElementById(`toggle-${idx}`).textContent = '❌ إخفاء البوصلة';
            document.getElementById(`compass-${idx}`).classList.add('active');
            document.getElementById(`target-${idx}`).textContent = targetAz.toFixed(1) + '°';
            
            addDegreeMarks(idx);

            // Request permission for iOS
            if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
                try {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    if (perm !== 'granted') return;
                } catch (e) {
                    console.error(e);
                    return;
                }
            }

            startOrientationListener(idx, targetAz);
        }

        function startOrientationListener(idx, targetAz) {
            const handler = (e) => {
                let heading = e.webkitCompassHeading ?? (360 - e.alpha);
                if (heading === null || isNaN(heading)) return;
                
                heading = (heading + 360) % 360;
                updateCompass(idx, heading, targetAz);
            };

            window.addEventListener('deviceorientation', handler);
            
            // Store for cleanup
            window._compassHandler = handler;
        }

        let lastUpdate = 0;
        function updateCompass(idx, heading, target) {
            const now = Date.now();
            if (now - lastUpdate < 50) return;
            lastUpdate = now;

            const ring = document.getElementById(`ring-${idx}`);
            const headEl = document.getElementById(`head-${idx}`);
            const diffEl = document.getElementById(`diff-${idx}`);
            const pill = document.getElementById(`pill-${idx}`);
            const pillText = document.getElementById(`pill-text-${idx}`);
            const statusRing = document.getElementById(`status-ring-${idx}`);

            // Rotate compass (inverse for needle effect)
            ring.style.transform = `rotate(${-heading}deg)`;
            headEl.textContent = heading.toFixed(1) + '°';

            // Calculate difference
            let diff = Math.abs(target - heading);
            if (diff > 180) diff = 360 - diff;
            diffEl.textContent = diff.toFixed(1) + '°';

            // Update status
            pill.className = 'alignment-pill';
            statusRing.className = 'status-ring';

            if (diff <= 2) {
                pill.classList.add('perfect');
                pillText.textContent = '🎯 محاذاة مثالية!';
                statusRing.classList.add('perfect');
                playTone(800, 0.3);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else if (diff <= 10) {
                pill.classList.add('close');
                pillText.textContent = `✅ قريب (${diff.toFixed(1)}°)`;
                statusRing.classList.add('close');
                playTone(600, 0.2);
            } else {
                pill.classList.add('far');
                pillText.textContent = `🔍 بعيد (${diff.toFixed(1)}°)`;
                statusRing.classList.add('far');
            }
        }

        function playTone(freq, vol) {
            if (!soundOn || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function closeCompass(idx) {
            activeCompass = null;
            if (window._compassHandler) {
                window.removeEventListener('deviceorientation', window._compassHandler);
            }
            
            const toggle = document.getElementById(`toggle-${idx}`);
            const section = document.getElementById(`compass-${idx}`);
            
            if (toggle) {
                toggle.classList.remove('active');
                toggle.textContent = '🧭 عرض البوصلة';
            }
            if (section) {
                section.classList.remove('active');
            }
        }

        function toggleSound(idx) {
            soundOn = !soundOn;
            const btn = document.getElementById(`sound-${idx}`);
            if (btn) {
                btn.classList.toggle('active', !soundOn);
                btn.innerHTML = `${soundOn ? '🔊' : '🔇'} صوت`;
            }
        }

        function resetCompass(idx) {
            const pill = document.getElementById(`pill-${idx}`);
            const pillText = document.getElementById(`pill-text-${idx}`);
            pill.className = 'alignment-pill far';
            pillText.textContent = '🔄 تم إعادة الضبط';
        }
    </script>
</body>
</html>
