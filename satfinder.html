<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satellite Pointer Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #007aff;
            --text-color: #ffffff;
            --green: #30d158;
            --orange: #ff9f0a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .header {
            padding: 15px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0; z-index: 1000;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .controls { display: flex; gap: 10px; margin-top: 10px; }
        
        button {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            background: var(--accent-color); color: white; font-weight: bold;
            font-size: 14px; cursor: pointer;
        }

        input {
            flex: 2; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: var(--card-color); color: white; outline: none; text-align: right;
        }

        /* حاوية الخريطة */
        #map {
            width: 100%;
            height: 300px; /* ارتفاع الخريطة */
            background: #333;
            border-bottom: 1px solid #333;
            display: none; /* مخفية حتى يتم تحديد الموقع */
        }

        .sat-list { padding: 10px; padding-bottom: 80px; }
        .sat-item {
            background: var(--card-color);
            padding: 15px; margin-bottom: 8px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333;
        }

        /* النافذة المنبثقة */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color); z-index: 2000;
            display: none; flex-direction: column;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px; text-align: center; background: var(--card-color);
        }

        .data-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
            padding: 15px; text-align: center;
        }
        .data-box small { color: #888; display: block; font-size: 11px; }
        .data-box strong { font-size: 18px; color: var(--accent-color); }

        .compass-container {
            position: relative; width: 220px; height: 220px; margin: 20px auto;
            background: radial-gradient(circle, #333 0%, #000 70%);
            border-radius: 50%; border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* قرص البوصلة المتحرك */
        #compassDisc {
            width: 100%; height: 100%; border-radius: 50%;
            position: absolute; transition: transform 0.1s linear;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Compass_Rose_English_North.svg/1024px-Compass_Rose_English_North.svg.png');
            background-size: cover; opacity: 0.8;
        }

        /* خط الهدف الثابت */
        #targetLine {
            position: absolute; top: 0; left: 50%; width: 2px; height: 50%;
            background: var(--green); transform: translateX(-50%); z-index: 2;
            box-shadow: 0 0 8px var(--green);
        }

        /* سهم اتجاه القمر */
        #satPointer {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 45%;
            background: var(--orange);
            transform-origin: top center;
            z-index: 3;
            border-radius: 2px;
        }

        .close-fab {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff3b30; color: white; padding: 15px 40px;
            border-radius: 30px; border: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="header">
        <h3>Satellite Finder <span style="color:var(--accent-color)">Map</span></h3>
        <div class="controls">
            <button onclick="getLocation()">📍 موقعي</button>
            <input type="text" id="search" placeholder="بحث..." onkeyup="renderList()">
        </div>
        <div id="status" style="font-size: 12px; margin-top: 5px; color: #888;">لم يتم تحديد الموقع</div>
    </div>

    <div class="sat-list" id="list"></div>

    <div class="modal" id="modal">
        <div class="modal-header">
            <h2 id="mName" style="margin:0">--</h2>
            <p id="mPos" style="margin:5px 0; color:#888">--</p>
        </div>

        <div class="data-grid">
            <div class="data-box">
                <small>الاتجاه (Azimuth)</small>
                <strong id="valAz">--</strong>
            </div>
            <div class="data-box">
                <small>الارتفاع (Elevation)</small>
                <strong id="valEl">--</strong>
            </div>
            <div class="data-box">
                <small>ميل العدسة (Skew)</small>
                <strong id="valSkew" style="color:var(--orange)">--</strong>
            </div>
        </div>

        <div style="text-align:center; padding: 0 20px;">
            <p style="font-size:13px; color:#aaa">1. الخط <span style="color:var(--green)">الأخضر</span>: اتجاه الهاتف.<br>2. الخط <span style="color:var(--orange)">البرتقالي</span>: اتجاه القمر.<br>طابق الخطين معاً!</p>
        </div>

        <div class="compass-container">
            <div id="compassDisc"></div> <div id="targetLine"></div>  <div id="satPointer"></div>  </div>

        <button class="close-fab" onclick="closeModal()">إغلاق</button>
    </div>

<script>
    // ----------------------------------------------------
    // 1. البيانات والإعدادات
    // ----------------------------------------------------
    const satellites = [
        { name: "Hispasat 30W", lon: -30.0 }, { name: "Intelsat 27.5W", lon: -27.5 },
        { name: "Nilesat 201 (7W)", lon: -7.0 }, { name: "Eutelsat 8W", lon: -8.0 },
        { name: "Amos 4W", lon: -4.0 }, { name: "Thor 0.8W", lon: -0.8 },
        { name: "Astra 4.8E", lon: 4.8 }, { name: "Eutelsat 7E", lon: 7.0 },
        { name: "Eutelsat 9B", lon: 9.0 }, { name: "Hot Bird 13E", lon: 13.0 },
        { name: "Eutelsat 16A", lon: 16.0 }, { name: "Astra 19.2E", lon: 19.2 },
        { name: "Astra 3B 23.5E", lon: 23.5 }, { name: "Badr 26E", lon: 26.0 },
        { name: "Astra 28.2E", lon: 28.2 }, { name: "Arabsat 30.5E", lon: 30.5 },
        { name: "Hellas Sat 39E", lon: 39.0 }, { name: "Turksat 42E", lon: 42.0 },
        { name: "Yahsat 52.5E", lon: 52.5 }, { name: "Intelsat 62E", lon: 62.0 },
        { name: "Eutelsat 70B", lon: 70.5 }, { name: "NSS 95E", lon: 95.0 }
    ];

    let userPos = null; // {lat, lng}
    let map = null;
    let satLine = null; // الخط المرسوم على الخريطة
    let currentSat = null;

    // ----------------------------------------------------
    // 2. دوال الخريطة (Leaflet Map)
    // ----------------------------------------------------
    function initMap(lat, lng) {
        document.getElementById('map').style.display = 'block';
        
        if (!map) {
            // إنشاء الخريطة لأول مرة
            map = L.map('map').setView([lat, lng], 18);
            
            // إضافة طبقة الصور الفضائية (Hybrid) لتبدو مثل Google Earth
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            }).addTo(map);

            // إضافة نقطة المستخدم
            L.marker([lat, lng]).addTo(map).bindPopup("موقعك").openPopup();
        } else {
            map.setView([lat, lng], 18);
        }
    }

    function drawDishPointerLine(azimuth) {
        if (!map || !userPos) return;

        // إزالة الخط القديم
        if (satLine) map.removeLayer(satLine);

        // حساب نقطة نهاية الخط (مسافة 500 متر باتجاه الأزيموث)
        // معادلة بسيطة للرسم على الخرائط المسطحة لمسافات قصيرة
        const dist = 0.005; // حوالي 500 متر تقريباً
        const azRad = azimuth * (Math.PI / 180);
        const endLat = userPos.lat + (dist * Math.cos(azRad));
        const endLng = userPos.lng + (dist * Math.sin(azRad));

        // رسم الخط
        satLine = L.polyline([
            [userPos.lat, userPos.lng],
            [endLat, endLng]
        ], {
            color: '#30d158', // أخضر نيون
            weight: 4,
            opacity: 0.9,
            dashArray: '10, 10' // خط متقطع مثل DishPointer
        }).addTo(map);

        // تحريك الخريطة لتشمل الخط
        map.fitBounds(satLine.getBounds());
    }

    // ----------------------------------------------------
    // 3. الحسابات الفلكية
    // ----------------------------------------------------
    function calculateData(satLon) {
        if (!userPos) return null;
        
        const latRad = userPos.lat * (Math.PI / 180);
        const diffLon = (satLon - userPos.lng) * (Math.PI / 180);

        // 1. Azimuth (الاتجاه)
        let az = Math.atan2(Math.sin(diffLon), -Math.tan(latRad) * Math.cos(diffLon));
        az = (az * 180 / Math.PI + 180) % 360;

        // 2. Elevation (الارتفاع)
        const r = 6371; // نصف قطر الأرض
        const h = 35786; // ارتفاع المدار
        const ratio = r / (r + h); // 0.1512
        const cosC = Math.cos(latRad) * Math.cos(diffLon);
        let el = Math.atan((cosC - ratio) / Math.sqrt(1 - cosC * cosC));
        el = el * 180 / Math.PI;

        // 3. LNB Skew (ميل العدسة) - ميزة DishPointer
        let skew = Math.atan(Math.sin(diffLon) / Math.tan(latRad));
        skew = skew * 180 / Math.PI;
        // تعديل بسيط لقراءة الميل بشكل عملي
        skew = -skew; // عكس الإشارة للتوافق مع دوران عقارب الساعة

        return { az, el, skew };
    }

    // ----------------------------------------------------
    // 4. واجهة المستخدم
    // ----------------------------------------------------
    function getLocation() {
        document.getElementById('status').innerText = "جاري الاتصال بالأقمار...";
        navigator.geolocation.getCurrentPosition(pos => {
            userPos = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };
            document.getElementById('status').innerText = `${userPos.lat.toFixed(4)}, ${userPos.lng.toFixed(4)}`;
            document.getElementById('status').style.color = "#30d158";
            
            // تفعيل الخريطة
            initMap(userPos.lat, userPos.lng);
            
            renderList();
        }, err => {
            alert("فشل تحديد الموقع. تأكد من تفعيل GPS");
        }, { enableHighAccuracy: true });
    }

    function renderList() {
        const term = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('list');
        
        list.innerHTML = satellites
            .filter(s => s.name.toLowerCase().includes(term))
            .map((s, idx) => {
                const data = userPos ? calculateData(s.lon) : null;
                const azText = data ? `${data.az.toFixed(1)}°` : "--";
                
                // نخزن الـ Index الأصلي لتجنب الأخطاء عند البحث
                const originalIndex = satellites.indexOf(s);
                
                return `
                <div class="sat-item" onclick="openModal(${originalIndex})">
                    <div>
                        <strong style="font-size:16px">${s.name}</strong>
                        <div style="font-size:12px; color:#888">مدار: ${s.lon}°</div>
                    </div>
                    <div style="text-align:left">
                        <div style="font-size:18px; color:var(--green); font-weight:bold">${azText}</div>
                        <div style="font-size:10px; color:#666">Azimuth</div>
                    </div>
                </div>`;
            }).join('');
    }

    // ----------------------------------------------------
    // 5. البوصلة والمودال
    // ----------------------------------------------------
    function openModal(idx) {
        if (!userPos) return alert("حدد موقعك أولاً لرسم الخط على الخريطة");
        
        currentSat = satellites[idx];
        const data = calculateData(currentSat.lon);

        document.getElementById('mName').innerText = currentSat.name;
        document.getElementById('mPos').innerText = `الموقع المداري: ${currentSat.lon}`;
        document.getElementById('valAz').innerText = data.az.toFixed(1) + '°';
        document.getElementById('valEl').innerText = data.el.toFixed(1) + '°';
        document.getElementById('valSkew').innerText = data.skew.toFixed(1) + '°';

        document.getElementById('modal').style.display = 'flex';

        // 1. رسم الخط على الخريطة في الخلفية
        drawDishPointerLine(data.az);

        // 2. تشغيل البوصلة
        startCompass(data.az);
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        window.ondeviceorientation = null; // إيقاف الحساس لتوفير البطارية
    }

    function startCompass(targetAzimuth) {
        // طلب الإذن في iOS
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(resp => {
                if (resp === 'granted') window.addEventListener('deviceorientation', e => handleOrientation(e, targetAzimuth));
            }).catch(console.error);
        } else {
            window.addEventListener('deviceorientation', e => handleOrientation(e, targetAzimuth));
        }
    }

    function handleOrientation(e, targetAz) {
        // نحصل على اتجاه الشمال المغناطيسي
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        
        if (heading) {
            // تدوير قرص البوصلة (الخلفية) ليتوافق مع الشمال الحقيقي للجهاز
            document.getElementById('compassDisc').style.transform = `rotate(${-heading}deg)`;
            
            // تدوير مؤشر القمر (البرتقالي) ليشير للزاوية المطلوبة بالنسبة للشمال
            // بما أن الخلفية تدور، المؤشر يجب أن يكون ثابتاً بالنسبة للخلفية (أي عند الزاوية المستهدفة)
            // ولكن بما أننا ندور الخلفية بـ -heading، نحتاج لجعل المؤشر يشير للزاوية Target
            // الحل الأبسط بصرياً:
            // 1. الخلفية تدور مع الشمال.
            // 2. خط الهاتف (الأخضر) ثابت للأعلى.
            // 3. سهم القمر (البرتقالي) يجب أن يشير للفرق.
            
            const diff = targetAz - heading;
            document.getElementById('satPointer').style.transform = `rotate(${diff}deg) translateY(0%)`; 
            // ملاحظة: translateY(0) لأن نقطة الدوران center، بينما في CSS هي top. 
            // التعديل: نستخدم Transform على العنصر الأب أو نعدل ال CSS. 
            
            // الطريقة الأفضل للعرض:
            // قرص البوصلة يدور ليمثل الشمال.
            // سهم القمر يتم تدويره ليتوافق مع درجة الأزيسموث على القرص.
            document.getElementById('satPointer').style.transform = `rotate(${targetAz}deg)`;
            
            // الآن بما أن القرص يدور (-heading)، وسهم القمر يدور (targetAz) ويكون ابناً للقرص (في الـ HTML هو ابن للحاوية لكن بصرياً فوقه).
            // انتظر، في الـ HTML كلاهما أبناء للحاوية.
            // إذن: القرص يدور عكس الهيدينغ. سهم القمر يجب أن يدور (targetAz - heading).
             document.getElementById('satPointer').style.transform = `rotate(${targetAz - heading}deg)`;
        }
    }

    // التهيئة
    renderList();

</script>
</body>
</html>
