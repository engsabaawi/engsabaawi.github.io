<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satellite Finder Pro - Full List</title>
    <style>
        :root {
            --apple-black: #000000;
            --apple-white: #ffffff;
            --apple-gray: #86868b;
            --apple-blue: #0071e3;
            --apple-green: #34c759;
            --apple-dark-bg: #1c1c1e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--apple-black);
            color: var(--apple-white);
            line-height: 1.6;
        }

        .header {
            padding: 20px;
            background: rgba(0,0,0,0.85);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
            border-bottom: 0.5px solid var(--glass-border);
        }

        .location-btn {
            background: var(--apple-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--apple-dark-bg);
            color: white;
            outline: none;
        }

        .sat-list { padding: 15px; }
        .sat-card {
            background: var(--apple-dark-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 0.5px solid var(--glass-border);
            cursor: pointer;
        }

        .sat-info h3 { font-size: 15px; margin-bottom: 2px; color: var(--apple-white); }
        .sat-info p { font-size: 12px; color: var(--apple-gray); }
        .angle-val { color: var(--apple-green); font-weight: bold; font-family: monospace; }

        /* Modal */
        #modalOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; z-index: 1000; padding: 20px; overflow-y: auto;
        }
        .modal-content {
            background: var(--apple-dark-bg);
            border-radius: 25px; padding: 30px; margin-top: 20px; text-align: center;
            border: 1px solid var(--glass-border);
        }
        .compass-ui {
            width: 200px; height: 200px; border: 2px solid var(--apple-gray);
            border-radius: 50%; margin: 20px auto; position: relative;
            background: radial-gradient(circle, #2c2c2e 0%, #000 100%);
        }
        #pointer {
            position: absolute; top: 10%; left: 50%; width: 4px; height: 40%;
            background: linear-gradient(to bottom, #ff3b30, #ff9500);
            transform-origin: bottom center; border-radius: 2px;
        }
        .close-btn { margin-top:20px; padding:12px 30px; border-radius:10px; border:none; background:#3a3a3c; color:white; font-weight:bold; width:100%; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="text-align:center; margin-bottom:15px;">Satellite Finder Pro</h2>
        <button class="location-btn" onclick="getLocation()">📍 تحديد الموقع (GPS)</button>
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن اسم القمر..." onkeyup="filterSatellites()">
        <p id="coords" style="font-size: 10px; color: var(--apple-green); text-align:center; margin-top:5px;"></p>
    </div>

    <div class="sat-list" id="mainList">
        </div>

    <div id="modalOverlay">
        <div class="modal-content">
            <h2 id="mName">اسم القمر</h2>
            <div style="display:flex; justify-content: space-around; margin:20px 0;">
                <div><small style="color:var(--apple-gray)">الاتجاه</small><div id="mAz" class="angle-val" style="font-size:20px;">--</div></div>
                <div><small style="color:var(--apple-gray)">الارتفاع</small><div id="mEl" class="angle-val" style="font-size:20px;">--</div></div>
            </div>
            <div class="compass-ui"><div id="pointer"></div></div>
            <p id="hint" style="font-size:13px; color:var(--apple-gray)">وجه رأس الهاتف للسهم</p>
            <button class="close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

<script>
    // قائمة شاملة من 30W إلى 108.5E
    const allSatellites = [
        { name: "Hispasat 30W", lon: -30.0 }, { name: "Intelsat 27.5W", lon: -27.5 },
        { name: "SES-4 22W", lon: -22.0 }, { name: "NSS-7 20W", lon: -20.0 },
        { name: "Telstar 15W", lon: -15.0 }, { name: "Express-AM8 14W", lon: -14.0 },
        { name: "Eutelsat 12 West 12.5W", lon: -12.5 }, { name: "Eutelsat 8 West B", lon: -8.0 },
        { name: "Nilesat 201/7W", lon: -7.0 }, { name: "Eutelsat 7 West A", lon: -7.3 },
        { name: "Eutelsat 5 West B", lon: -5.0 }, { name: "Amos 4W", lon: -4.0 },
        { name: "Thor 0.8W", lon: -0.8 }, { name: "BulgariaSat-1 1.9E", lon: 1.9 },
        { name: "Eutelsat 3B 3.1E", lon: 3.1 }, { name: "Astra 4A 4.8E", lon: 4.8 },
        { name: "SES-5 5E", lon: 5.0 }, { name: "Eutelsat 7C 7E", lon: 7.0 },
        { name: "Eutelsat 9B 9E", lon: 9.0 }, { name: "Eutelsat 10A 10E", lon: 10.0 },
        { name: "Hot Bird 13E", lon: 13.0 }, { name: "Eutelsat 16A 16E", lon: 16.0 },
        { name: "Astra 19.2E", lon: 19.2 }, { name: "Eutelsat 21B 21E", lon: 21.6 },
        { name: "Astra 3B 23.5E", lon: 23.5 }, { name: "Es'hail 2 25.8E", lon: 25.8 },
        { name: "Badr/Arabsat 26E", lon: 26.0 }, { name: "Astra 2 28.2E", lon: 28.2 },
        { name: "Arabsat 5A 30.5E", lon: 30.5 }, { name: "Eutelsat 33E 33E", lon: 33.0 },
        { name: "Eutelsat 36B 36E", lon: 36.0 }, { name: "Paksat 1R 38E", lon: 38.0 },
        { name: "Hellas Sat 3 39E", lon: 39.0 }, { name: "Turksat 4A/5B 42E", lon: 42.0 },
        { name: "Azerspace 1 46E", lon: 46.0 }, { name: "G-SAT 31 48E", lon: 48.0 },
        { name: "Türksat 4B 50E", lon: 50.0 }, { name: "Yahsat 1A 52.5E", lon: 52.5 },
        { name: "Express-AM6 53E", lon: 53.0 }, { name: "Yamal 402 55E", lon: 55.0 },
        { name: "NSS-12 57E", lon: 57.0 }, { name: "Intelsat 20 68.5E", lon: 68.5 },
        { name: "ABS-2 75E", lon: 75.0 }, { name: "Thaicom 8 78.5E", lon: 78.5 },
        { name: "G-SAT 15 93.5E", lon: 93.5 }, { name: "Asiasat 7 105.5E", lon: 105.5 },
        { name: "SES-7/9 108.2E", lon: 108.2 }, { name: "Telkom 4 108.5E", lon: 108.5 }
    ];

    let userLat = null, userLon = null;

    function render(data = allSatellites) {
        const listContainer = document.getElementById('mainList');
        if (!listContainer) return;
        
        listContainer.innerHTML = data.map(s => `
            <div class="sat-card" onclick="openModalByName('${s.name}')">
                <div class="sat-info">
                    <h3>${s.name}</h3>
                    <p>الموقع المداري: ${s.lon > 0 ? s.lon + '° E' : Math.abs(s.lon) + '° W'}</p>
                </div>
                <div class="angle-val">${userLat ? calcAz(userLat, userLon, s.lon).toFixed(1) + '°' : '---'}</div>
            </div>
        `).join('');
    }

    function calcAz(lat, lon, satLon) {
        const dLon = (satLon - lon) * Math.PI / 180;
        const latR = lat * Math.PI / 180;
        const az = Math.atan2(Math.sin(dLon), -Math.tan(latR) * Math.cos(dLon));
        return (az * 180 / Math.PI + 180) % 360;
    }

    function calcEl(lat, lon, satLon) {
        const dLon = (satLon - lon) * Math.PI / 180;
        const latR = lat * Math.PI / 180;
        const cosC = Math.cos(latR) * Math.cos(dLon);
        const el = Math.atan((cosC - 0.1512) / Math.sqrt(1 - cosC * cosC));
        return Math.max(0, el * 180 / Math.PI);
    }

    function filterSatellites() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allSatellites.filter(s => s.name.toLowerCase().includes(term));
        render(filtered);
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            userLat = p.coords.latitude;
            userLon = p.coords.longitude;
            document.getElementById('coords').innerText = `الموقع الحالي: ${userLat.toFixed(2)}, ${userLon.toFixed(2)}`;
            render();
        }, () => alert("يرجى تفعيل الـ GPS"));
    }

    function openModalByName(name) {
        if(!userLat) return alert("حدد موقعك أولاً!");
        const s = allSatellites.find(i => i.name === name);
        const az = calcAz(userLat, userLon, s.lon);
        const el = calcEl(userLat, userLon, s.lon);
        
        document.getElementById('mName').innerText = s.name;
        document.getElementById('mAz').innerText = az.toFixed(1) + '°';
        document.getElementById('mEl').innerText = el.toFixed(1) + '°';
        document.getElementById('modalOverlay').style.display = 'block';

        window.ondeviceorientation = (e) => {
            const heading = e.webkitCompassHeading || (360 - e.alpha);
            if(heading) document.getElementById('pointer').style.transform = `rotate(${az - heading}deg)`;
        };
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        window.ondeviceorientation = null;
    }

    // التشغيل التلقائي عند التحميل
    window.addEventListener('load', () => render());
</script>
</body>
</html>
